<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserHandle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }

    .header .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #0f3460;
      color: #53c7f0;
    }

    .header .status.connected {
      background: #1a4a1a;
      color: #4ade80;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .log-entry {
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      background: #16213e;
      border-left: 3px solid #0f3460;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .log-entry.action-snapshot { border-left-color: #53c7f0; }
    .log-entry.action-click { border-left-color: #e94560; }
    .log-entry.action-typeText { border-left-color: #4ade80; }
    .log-entry.action-selectOption { border-left-color: #f59e0b; }
    .log-entry.action-listWebMCPTools { border-left-color: #a78bfa; }
    .log-entry.action-invokeWebMCPTool { border-left-color: #ec4899; }

    .log-entry .action-name {
      font-weight: 600;
      color: #53c7f0;
    }

    .log-entry .timestamp {
      float: right;
      color: #666;
      font-size: 10px;
    }

    .log-entry .details {
      margin-top: 4px;
      color: #999;
      word-break: break-all;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-style: italic;
    }

    .clear-btn {
      background: none;
      border: 1px solid #0f3460;
      color: #666;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin-left: auto;
    }

    .clear-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .status.connecting { background: #14304d; color: #53c7f0; }
    .status.warn { background: #3a2e10; color: #f59e0b; }
    .status.error { background: #3a1420; color: #f87171; }
    .status.idle { background: #222; color: #888; }

    .settings {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 10px 16px;
    }
    .settings summary {
      cursor: pointer;
      font-size: 12px;
      color: #53c7f0;
      user-select: none;
      list-style: none;
    }
    .settings summary::-webkit-details-marker { display: none; }
    .settings summary::before { content: '⚙ '; }
    .settings .form { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .settings label { font-size: 11px; color: #999; display: flex; flex-direction: column; gap: 3px; }
    .settings input[type="text"],
    .settings input[type="password"] {
      background: #0f1a30;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .settings .row { display: flex; align-items: center; gap: 8px; }
    .settings .row label { flex-direction: row; align-items: center; gap: 6px; }
    .settings button {
      background: #0f3460;
      border: none;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .settings button:hover { background: #1a4a80; }
    .settings .handle-id { font-size: 10px; color: #666; word-break: break-all; }
    .settings .detail { font-size: 10px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>BrowserHandle</h1>
    <span class="status idle" id="status">Idle</span>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>
  <details class="settings" id="settings">
    <summary>Connection settings</summary>
    <div class="form">
      <label>Relay URL
        <input type="text" id="relayUrl" placeholder="ws://127.0.0.1:18080/ws/browser" />
      </label>
      <label>Token (optional)
        <input type="password" id="token" placeholder="leave empty for a tokenless local relay" />
      </label>
      <label>Browser name
        <input type="text" id="name" placeholder="Chrome" />
      </label>
      <div class="row">
        <label><input type="checkbox" id="enabled" /> Connect to relay</label>
        <button id="saveBtn" type="button">Save &amp; reconnect</button>
      </div>
      <div class="detail" id="statusDetail"></div>
      <div class="handle-id" id="handleId"></div>
    </div>
  </details>
  <div class="log-container" id="logContainer">
    <div class="empty-state" id="emptyState">
      Waiting for agent activity...
    </div>
  </div>
  <script src="./sidepanel.ts" type="module"></script>
</body>
</html>
